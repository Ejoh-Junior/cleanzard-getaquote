<section>
  <iframe
    id="quoteFrame"
    src=""
    width="100%"
    title="Get a Cleaning Quote"
    style="
      display: block;
      border: none;
    "
  ></iframe>

  <script>
    (function () {
      const BASE_URL = 'https://cleanzard-get-a-quote.netlify.app/'

      // Read query params from the current GoDaddy page URL.
      // This lets us forward ?quoteId=Q-XXXXXX from the email link into the iframe.
      // e.g. cleanzard.ca/quote?quoteId=Q-ABC123  →  iframe loads with ?quoteId=Q-ABC123
      const parentParams = window.location.search  // e.g. "?quoteId=Q-ABC123"

      const iframe = document.getElementById('quoteFrame')
      iframe.src = BASE_URL + parentParams

      // ── Iframe auto-resize ──────────────────────────────────────────────────
      // Listens for height messages posted by the Vue app (sendHeight in App.vue)
      window.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'resize') {
          iframe.style.height = e.data.height + 'px'
        }
      })
    })()
  </script>
</section>
